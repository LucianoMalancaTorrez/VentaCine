# =============================================
# Configuración del servidor
# =============================================
server.port=8080

# =============================================
# Configuración de MySQL
# IMPORTANTE: Cambiá la contraseña por la tuya
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ventacine_db?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configuración de JPA / Hibernate
# ddl-auto=update crea las tablas automáticamente
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Configuración de Thymeleaf
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
