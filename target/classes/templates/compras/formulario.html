<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="form-cine">
            <h2 class="form-titulo"><i class="fas fa-shopping-cart"></i> <span th:text="${titulo}">Nueva Compra</span></h2>
            <form th:action="@{/compras/guardar}" method="post">
                <input type="hidden" name="id" th:value="${compra.id}">
                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha *</label>
                    <input type="text" id="fecha" name="fecha" th:value="${compra.fecha}" class="form-control" placeholder="Ej: 25/03/2026" required>
                </div>
                <div class="mb-3">
                    <label for="cineId" class="form-label">Cine</label>
                    <select id="cineId" name="cineId" class="form-select">
                        <option value="">-- Seleccioná --</option>
                        <option th:each="c : ${cines}" th:value="${c.id}" th:text="${c.nombre}"
                                th:selected="${compra.cine != null and compra.cine.id == c.id}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="insumoIds" class="form-label">Insumos</label>
                    <select id="insumoIds" name="insumoIds" class="form-select" multiple size="4">
                        <option th:each="i : ${insumos}" th:value="${i.id}" th:text="${i.nombre + ' ($' + i.precio + ')'}"></option>
                    </select>
                    <small class="text-muted">Mantené Ctrl para seleccionar varios</small>
                </div>
                <div class="mb-4">
                    <label for="proveedorIds" class="form-label">Proveedores</label>
                    <select id="proveedorIds" name="proveedorIds" class="form-select" multiple size="4">
                        <option th:each="p : ${proveedores}" th:value="${p.id}" th:text="${p.nombre}"></option>
                    </select>
                    <small class="text-muted">Mantené Ctrl para seleccionar varios</small>
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/compras}" class="btn-cine-outline"><i class="fas fa-arrow-left"></i> Cancelar</a>
                    <button type="submit" class="btn-cine"><i class="fas fa-save"></i> Registrar Compra</button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
