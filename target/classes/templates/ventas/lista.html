<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Ventas')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-ticket-alt me-2" style="color: var(--success);"></i>Ventas</h1>
            <a th:href="@{/ventas/nueva}" class="btn-cine"><i class="fas fa-plus"></i> Nueva Venta</a>
        </div>
        <div th:if="${exito}" class="alerta-exito"><i class="fas fa-check-circle"></i><span th:text="${exito}"></span></div>
        <div th:if="${error}" class="alerta-error"><i class="fas fa-exclamation-circle"></i><span th:text="${error}"></span></div>
        <div th:if="${not #lists.isEmpty(ventas)}">
            <table class="tabla-cine">
                <thead><tr><th>ID</th><th>Fecha</th><th>Monto</th><th>Tipo Pago</th><th>Clientes</th><th>Funciones</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="venta : ${ventas}">
                        <td th:text="${venta.id}"></td>
                        <td th:text="${venta.fecha}"></td>
                        <td th:text="${venta.pago != null} ? '$' + ${venta.pago.monto} : '-'"></td>
                        <td th:text="${venta.pago != null} ? ${venta.pago.tipo} : '-'"></td>
                        <td th:text="${venta.clientes.size()}"></td>
                        <td th:text="${venta.funciones.size()}"></td>
                        <td class="acciones">
                            <a th:href="@{/ventas/editar/{id}(id=${venta.id})}" class="btn-editar"><i class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/ventas/eliminar/{id}(id=${venta.id})}" class="btn-eliminar" data-nombre="esta venta"><i class="fas fa-trash"></i> Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(ventas)}" class="empty-state">
            <i class="fas fa-ticket-alt"></i><p>No hay ventas registradas</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
