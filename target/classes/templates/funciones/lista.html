<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Funciones')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-clock me-2" style="color: var(--accent-gold);"></i>Funciones</h1>
            <a th:href="@{/funciones/nueva}" class="btn-cine"><i class="fas fa-plus"></i> Nueva Función</a>
        </div>
        <div th:if="${exito}" class="alerta-exito"><i class="fas fa-check-circle"></i><span th:text="${exito}"></span></div>
        <div th:if="${error}" class="alerta-error"><i class="fas fa-exclamation-circle"></i><span th:text="${error}"></span></div>

        <div th:if="${not #lists.isEmpty(funciones)}">
            <table class="tabla-cine">
                <thead><tr><th>ID</th><th>Horario</th><th>Película</th><th>Sala</th><th>Entradas</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="funcion : ${funciones}">
                        <td th:text="${funcion.id}"></td>
                        <td><i class="fas fa-clock me-1" style="color: var(--accent-gold);"></i><span th:text="${funcion.horario}"></span></td>
                        <td th:text="${funcion.pelicula != null ? funcion.pelicula.titulo : 'Sin asignar'}"></td>
                        <td th:text="${funcion.sala != null ? 'Sala ' + funcion.sala.numero : 'Sin asignar'}"></td>
                        <td th:text="${funcion.entradas != null ? funcion.entradas.size() : 0}"></td>
                        <td class="acciones">
                            <a th:href="@{/funciones/editar/{id}(id=${funcion.id})}" class="btn-editar"><i class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/funciones/eliminar/{id}(id=${funcion.id})}" class="btn-eliminar" data-nombre="esta función"><i class="fas fa-trash"></i> Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(funciones)}" class="empty-state">
            <i class="fas fa-clock"></i><p>No hay funciones programadas</p>
            <a th:href="@{/funciones/nueva}" class="btn-cine"><i class="fas fa-plus"></i> Programar función</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
