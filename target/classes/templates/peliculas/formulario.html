<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="contenido-principal">
    <div class="container">
        <div class="form-cine">
            <h2 class="form-titulo"><i class="fas fa-video"></i> <span th:text="${titulo}">Nueva Película</span></h2>

            <form th:action="@{/peliculas/guardar}" th:object="${pelicula}" method="post" novalidate>
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="titulo" class="form-label">Título de la película *</label>
                    <input type="text" id="titulo" th:field="*{titulo}" class="form-control"
                           th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''"
                           placeholder="Ej: Avengers Endgame" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
                </div>

                <div class="mb-4">
                    <label for="genero" class="form-label">Género *</label>
                    <select id="genero" th:field="*{genero}" class="form-select"
                            th:classappend="${#fields.hasErrors('genero')} ? 'is-invalid' : ''" required>
                        <option value="">-- Seleccioná un género --</option>
                        <option th:each="g : ${generos}" th:value="${g}" th:text="${g}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></div>
                </div>

                <div class="mb-4">
                    <label for="imagenUrl" class="form-label">URL de imagen (póster)</label>
                    <input type="url" id="imagenUrl" th:field="*{imagenUrl}" class="form-control"
                           placeholder="Ej: https://image.tmdb.org/t/p/w500/poster.jpg">
                    <small class="text-muted">Pegá el link de una imagen del póster de la película</small>
                </div>                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/peliculas}" class="btn-cine-outline">
                        <i class="fas fa-arrow-left"></i> Cancelar
                    </a>
                    <button type="submit" class="btn-cine">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
