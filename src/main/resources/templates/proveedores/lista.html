<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Proveedores')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-truck me-2" style="color: var(--info);"></i>Proveedores</h1>
            <a th:href="@{/proveedores/nuevo}" class="btn-cine"><i class="fas fa-plus"></i> Nuevo Proveedor</a>
        </div>
        <div th:if="${exito}" class="alerta-exito"><i class="fas fa-check-circle"></i><span th:text="${exito}"></span></div>
        <div th:if="${error}" class="alerta-error"><i class="fas fa-exclamation-circle"></i><span th:text="${error}"></span></div>
        <div th:if="${not #lists.isEmpty(proveedores)}">
            <table class="tabla-cine">
                <thead><tr><th>ID</th><th>Nombre</th><th>Teléfono</th><th>Dirección</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="proveedor : ${proveedores}">
                        <td th:text="${proveedor.id}"></td>
                        <td th:text="${proveedor.nombre}"></td>
                        <td th:text="${proveedor.telefono}"></td>
                        <td th:text="${proveedor.direccion}"></td>
                        <td class="acciones">
                            <a th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}" class="btn-editar"><i class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/proveedores/eliminar/{id}(id=${proveedor.id})}" class="btn-eliminar" th:data-nombre="${proveedor.nombre}"><i class="fas fa-trash"></i> Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(proveedores)}" class="empty-state">
            <i class="fas fa-truck"></i><p>No hay proveedores registrados</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
