<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="form-cine">
            <h2 class="form-titulo"><i class="fas fa-box"></i> <span th:text="${titulo}">Nuevo Insumo</span></h2>
            <form th:action="@{/insumos/guardar}" th:object="${insumo}" method="post" novalidate>
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del insumo *</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                           placeholder="Ej: Pochoclos grandes" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="mb-4">
                    <label for="precio" class="form-label">Precio ($) *</label>
                    <input type="text" id="precio" th:field="*{precio}" class="form-control solo-decimales"
                           th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid' : ''"
                           placeholder="Ej: 850.50" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/insumos}" class="btn-cine-outline"><i class="fas fa-arrow-left"></i> Cancelar</a>
                    <button type="submit" class="btn-cine"><i class="fas fa-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
