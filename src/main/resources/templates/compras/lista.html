<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Compras')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="contenido-principal">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-shopping-cart me-2" style="color: var(--warning);"></i>Compras</h1>
            <a th:href="@{/compras/nueva}" class="btn-cine"><i class="fas fa-plus"></i> Nueva Compra</a>
        </div>
        <div th:if="${exito}" class="alerta-exito"><i class="fas fa-check-circle"></i><span th:text="${exito}"></span></div>
        <div th:if="${error}" class="alerta-error"><i class="fas fa-exclamation-circle"></i><span th:text="${error}"></span></div>
        <div th:if="${not #lists.isEmpty(compras)}">
            <table class="tabla-cine">
                <thead><tr><th>ID</th><th>Fecha</th><th>Insumos</th><th>Proveedores</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="compra : ${compras}">
                        <td th:text="${compra.id}"></td>
                        <td th:text="${compra.fecha}"></td>
                        <td th:text="${compra.insumos.size()}"></td>
                        <td th:text="${compra.proveedores.size()}"></td>
                        <td class="acciones">
                            <a th:href="@{/compras/editar/{id}(id=${compra.id})}" class="btn-editar"><i class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/compras/eliminar/{id}(id=${compra.id})}" class="btn-eliminar" data-nombre="esta compra"><i class="fas fa-trash"></i> Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(compras)}" class="empty-state">
            <i class="fas fa-shopping-cart"></i><p>No hay compras registradas</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
